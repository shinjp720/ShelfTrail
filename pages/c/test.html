<table>
    <tr>
        <td><code>fseek(fp, 0L, SEEK_SET)<code></td>
        <td>ファイル先頭へ移動</td>
    </tr>
    <tr>
        <td>fseek(fp, 0L, SEEK_CUR)</td>
        <td>移動しない</td>
    </tr>
    <tr>
        <td>fseek(fp, ftell(fp), SEEK_SET)</td>
        <td>前に指定した位置に移動</td>
    </tr>
    <tr>
        <td>fseek(fp, 0L, SEEK_END)</td>
        <td>ファイル終末へ移動</td>
    </tr>
</table>
